  <script>
// ===== CONFIG & SDK =====
const defaultConfig = {
  module_title: 'Dasar-Dasar Kehutanan',

  background_color: '#f0fdf4',
  surface_color: '#ffffff',
  text_color: '#14532d',
  primary_color: '#16a34a',
  accent_color: '#8B5E3C'
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    document.getElementById('sidebar-title').textContent = config.module_title || defaultConfig.module_title;
    document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },

      get: () => config.font_family || 'Nunito',
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }

    ['module_title', config.module_title || defaultConfig.module_title],
    ['school_name', config.school_name || defaultConfig.school_name]

});

// ===== SECTIONS DATA =====
const sections = [
  { id: 'welcome', title: '🏠 Selamat Datang', icon: 'home' },
  { id: 'tujuan', title: '🎯 Tujuan Pembelajaran', icon: 'target' },
  { id: 'pengertian-kehutanan', title: '🌳 Pengertian Kehutanan', icon: 'trees' },

  { id: 'fungsi-hutan', title: '⚡ Fungsi Hutan', icon: 'zap' },
  { id: 'jenis-hutan', title: '🗂️ Jenis-Jenis Hutan', icon: 'layers' },
  { id: 'keanekaragaman', title: '🦋 Keanekaragaman Hayati', icon: 'bug' },
  { id: 'permasalahan', title: '⚠️ Permasalahan Kehutanan', icon: 'alert-triangle' },
  { id: 'pelestarian', title: '💚 Upaya Pelestarian', icon: 'shield' },
  { id: 'peran-masyarakat', title: '👥 Peran Masyarakat', icon: 'users' },
  { id: 'studi-kasus', title: '📋 Studi Kasus', icon: 'clipboard' },
  { id: 'aktivitas', title: '🎮 Aktivitas Interaktif', icon: 'gamepad-2' },
  { id: 'kuis', title: '📝 Kuis', icon: 'file-question' },
  { id: 'ringkasan', title: '📖 Ringkasan', icon: 'book-open' }
];

let currentSection = 0;
let quizAnswers = {};
let quizSubmitted = false;

// ===== NAVIGATION =====
function buildNav() {
  const navHTML = sections.map((s, i) => `
    <button class="nav-item text-left px-3 py-2 rounded-lg text-sm ${i === currentSection ? 'active' : 'text-forest-300 hover:bg-forest-700/50'}" data-idx="${i}">
      ${s.title}
    </button>
  `).join('');
  document.getElementById('nav-list').innerHTML = navHTML;
  document.getElementById('mobile-nav-list').innerHTML = navHTML;
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => { goToSection(parseInt(btn.dataset.idx)); });
  });
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((currentSection / (sections.length - 1)) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '% selesai';
  document.getElementById('prev-btn').disabled = currentSection === 0;
  document.getElementById('next-btn').querySelector('span').textContent = currentSection === sections.length - 1 ? 'Selesai 🎉' : 'Selanjutnya';
}

function goToSection(idx) {
  currentSection = idx;
  buildNav();
  renderContent();
  document.getElementById('main-content').scrollTop = 0;
  document.getElementById('mobile-nav').classList.add('hidden');
}

// ===== CONTENT RENDERER =====
function renderContent() {
  const area = document.getElementById('content-area');
  const id = sections[currentSection].id;
  area.innerHTML = getContentHTML(id);
  area.querySelector('.section-card')?.offsetHeight; // trigger reflow
  lucide.createIcons();
  if (id === 'aktivitas') initActivities();
  if (id === 'kuis') initQuiz();
}

// ===== ACTIVITIES =====
function initActivities() {
  // Matching activity
  const matchData = [
    { term: 'Reboisasi', def: 'Penanaman kembali hutan yang rusak' },
    { term: 'Deforestasi', def: 'Penggundulan hutan secara besar-besaran' },
    { term: 'Biodiversitas', def: 'Keanekaragaman hayati/makhluk hidup' },
    { term: 'Konservasi', def: 'Perlindungan dan pelestarian alam' }
  ];
  const shuffled = [...matchData].sort(() => Math.random() - 0.5);
  const termsEl = document.getElementById('match-terms');
  const targetsEl = document.getElementById('match-targets');
  
  termsEl.innerHTML = shuffled.map(m => `<div class="drag-item bg-forest-600 text-white px-3 py-2 rounded-lg text-sm font-semibold" draggable="true" data-term="${m.term}">${m.term}</div>`).join('');
  targetsEl.innerHTML = matchData.map(m => `<div class="drop-zone border-2 border-dashed border-forest-300 rounded-lg p-3 flex items-center gap-3" data-answer="${m.term}"><span class="text-xs text-forest-600 flex-1">${m.def}</span><span class="dropped-item text-sm font-semibold text-forest-800"></span></div>`).join('');

  // Drag events for matching
  termsEl.querySelectorAll('.drag-item').forEach(item => {
    item.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', item.dataset.term));
  });
  targetsEl.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      const term = e.dataTransfer.getData('text/plain');
      zone.querySelector('.dropped-item').textContent = term;
      const src = termsEl.querySelector(`[data-term="${term}"]`);
      if (src) src.style.opacity = '0.4';
      // Check if correct
      if (term === zone.dataset.answer) {
        zone.classList.add('bg-green-50', 'border-green-400');
      } else {
        zone.classList.add('bg-red-50', 'border-red-400');
      }
    });
  });

  // Categorize activity
  const catData = [
    { text: 'Menyerap CO₂', cat: 'ekologis' },
    { text: 'Sumber kayu', cat: 'ekonomi' },
    { text: 'Nilai budaya', cat: 'sosial' },
    { text: 'Mencegah erosi', cat: 'ekologis' },
    { text: 'Ekowisata', cat: 'ekonomi' },
    { text: 'Penelitian', cat: 'sosial' }
  ];
  const catItemsEl = document.getElementById('cat-items');
  const shuffledCat = [...catData].sort(() => Math.random() - 0.5);
  catItemsEl.innerHTML = shuffledCat.map(c => `<div class="drag-item bg-bark-500 text-white px-3 py-2 rounded-lg text-xs font-semibold" draggable="true" data-cat="${c.cat}" data-text="${c.text}">${c.text}</div>`).join('');

  catItemsEl.querySelectorAll('.drag-item').forEach(item => {
    item.addEventListener('dragstart', e => e.dataTransfer.setData('application/json', JSON.stringify({ text: item.dataset.text, cat: item.dataset.cat })));
  });

  ['cat-ekologis', 'cat-ekonomi', 'cat-sosial'].forEach(id => {
    const zone = document.getElementById(id);
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      const data = JSON.parse(e.dataTransfer.getData('application/json'));
      const tag = document.createElement('div');
      tag.className = 'bg-white rounded px-2 py-1 text-xs border';
      tag.textContent = data.text;
      tag.dataset.cat = data.cat;
      zone.querySelector('div').appendChild(tag);
      const src = catItemsEl.querySelector(`[data-text="${data.text}"]`);
      if (src) src.style.display = 'none';
    });
  });

  document.getElementById('cat-check-btn').addEventListener('click', () => {
    let correct = 0, total = 0;
    ['cat-ekologis', 'cat-ekonomi', 'cat-sosial'].forEach(id => {
      const cat = id.replace('cat-', '');
      document.getElementById(id).querySelectorAll('[data-cat]').forEach(el => {
        total++;
        if (el.dataset.cat === cat) { correct++; el.classList.add('border-green-500', 'bg-green-50'); }
        else { el.classList.add('border-red-500', 'bg-red-50'); }
      });
    });
    const fb = document.getElementById('cat-feedback');
    fb.classList.remove('hidden');
    fb.innerHTML = `<div class="p-3 rounded-lg ${correct === total && total > 0 ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'} text-sm font-semibold">${correct === total && total > 0 ? '🎉 Sempurna!' : `Kamu mendapat ${correct}/${total} benar. Coba lagi!`}</div>`;
  });
}

function initQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = quizData.map((q, i) => `
    <div class="mb-5 bg-forest-50 rounded-xl p-5 border border-forest-100">
      <p class="font-semibold text-forest-900 text-sm mb-3">${i+1}. ${q.q}</p>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        ${q.opts.map((o, j) => `
          <button class="quiz-option text-left px-4 py-3 rounded-lg border-2 ${quizAnswers[i] === j ? 'border-forest-500 bg-forest-100' : 'border-gray-200 bg-white'} text-sm hover:border-forest-400" data-q="${i}" data-o="${j}">
            <span class="font-semibold text-forest-600 mr-2">${['A','B','C','D'][j]}.</span>${o}
          </button>
        `).join('')}
      </div>
      <div id="quiz-fb-${i}" class="mt-2 text-sm hidden"></div>
    </div>
  `).join('');

  container.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      if (quizSubmitted) return;
      const qi = parseInt(btn.dataset.q);
      const oi = parseInt(btn.dataset.o);
      quizAnswers[qi] = oi;
      // Update selection visual
      container.querySelectorAll(`[data-q="${qi}"]`).forEach(b => { b.classList.remove('border-forest-500','bg-forest-100'); b.classList.add('border-gray-200','bg-white'); });
      btn.classList.remove('border-gray-200','bg-white');
      btn.classList.add('border-forest-500','bg-forest-100');
    });
  });

  document.getElementById('quiz-submit').addEventListener('click', () => {
    quizSubmitted = true;
    let score = 0;
    quizData.forEach((q, i) => {
      const fb = document.getElementById(`quiz-fb-${i}`);
      fb.classList.remove('hidden');
      if (quizAnswers[i] === q.ans) {
        score++;
        fb.innerHTML = `<span class="text-green-700 font-semibold">✅ Benar!</span>`;
        container.querySelector(`[data-q="${i}"][data-o="${q.ans}"]`)?.classList.add('border-green-500','bg-green-50');
      } else {
        fb.innerHTML = `<span class="text-red-700 font-semibold">❌ Salah.</span> Jawaban benar: <strong>${['A','B','C','D'][q.ans]}</strong>`;
        if (quizAnswers[i] !== undefined) container.querySelector(`[data-q="${i}"][data-o="${quizAnswers[i]}"]`)?.classList.add('border-red-500','bg-red-50');
        container.querySelector(`[data-q="${i}"][data-o="${q.ans}"]`)?.classList.add('border-green-500','bg-green-50');
      }
    });
    const result = document.getElementById('quiz-result');
    result.classList.remove('hidden');
    const pct = Math.round(score / quizData.length * 100);
    result.innerHTML = `<div class="text-center p-6 rounded-2xl ${pct >= 70 ? 'bg-green-100 border-2 border-green-300' : 'bg-amber-100 border-2 border-amber-300'}">
      <p class="text-3xl font-bold ${pct >= 70 ? 'text-green-700' : 'text-amber-700'}">${score}/${quizData.length}</p>
      <p class="text-lg font-semibold mt-1 ${pct >= 70 ? 'text-green-600' : 'text-amber-600'}">${pct >= 70 ? '🎉 Luar biasa!' : '📚 Pelajari lagi materinya ya!'}</p>
      <p class="text-sm mt-2 ${pct >= 70 ? 'text-green-600' : 'text-amber-600'}">Skor: ${pct}% ${pct >= 70 ? '- Kamu lulus!' : '- Minimum kelulusan 70%'}</p>
    </div>`;
    document.getElementById('quiz-submit').style.display = 'none';
  });
}

document.getElementById('prev-btn').addEventListener('click', () => { if (currentSection > 0) goToSection(currentSection - 1); });
document.getElementById('next-btn').addEventListener('click', () => { if (currentSection < sections.length - 1) goToSection(currentSection + 1); });
document.getElementById('mobile-menu-btn')?.addEventListener('click', () => document.getElementById('mobile-nav').classList.remove('hidden'));
document.getElementById('mobile-close-btn')?.addEventListener('click', () => document.getElementById('mobile-nav').classList.add('hidden'));

buildNav();
renderContent();
lucide.createIcons();
